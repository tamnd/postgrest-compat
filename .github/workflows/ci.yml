name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-postgrest:
    name: "test against PostgREST"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: start PostgREST stack
        run: docker compose -f docker/postgrest/compose.yaml up -d

      - name: wait for PostgREST
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "PostgREST is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for PostgREST"
          docker compose -f docker/postgrest/compose.yaml logs
          exit 1

      - name: run client tests
        run: go test -p 1 ./client/... -v -timeout 120s
        env:
          POSTGREST_URL: http://localhost:3000
          JWT_SECRET: reallyreallyreallyreallyverysafe

      - name: stop stack
        if: always()
        run: docker compose -f docker/postgrest/compose.yaml down -v

  test-dbrest:
    name: "test against dbrest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: start PostgreSQL
        run: docker compose -f docker/dbrest/pg-only.yaml up -d

      - name: checkout dbrest
        uses: actions/checkout@v4
        with:
          repository: tamnd/dbrest
          ref: feat/sqlite-compat
          path: dbrest-src

      - name: build dbrest
        run: go build -o /tmp/dbrest ./cmd/dbrest
        working-directory: dbrest-src

      - name: wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec compat-pg-dbrest pg_isready -U postgres -d postgres > /dev/null 2>&1; then
              echo "PostgreSQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for PostgreSQL"
          docker compose -f docker/dbrest/pg-only.yaml logs
          exit 1

      - name: verify db permissions
        run: |
          echo "=== roles ==="
          docker exec compat-pg-dbrest psql -U postgres -d postgres -c "SELECT rolname, rolcanlogin FROM pg_roles WHERE rolname IN ('authenticator','web_anon','web_user') ORDER BY rolname;"
          echo "=== member of ==="
          docker exec compat-pg-dbrest psql -U postgres -d postgres -c "SELECT r.rolname member, g.rolname grantee FROM pg_auth_members m JOIN pg_roles r ON r.oid=m.member JOIN pg_roles g ON g.oid=m.roleid WHERE r.rolname='authenticator';"
          echo "=== has_table_privilege ==="
          docker exec compat-pg-dbrest psql -U postgres -d postgres -c "SELECT has_table_privilege('web_anon','api.todos','SELECT') AS can_select;"
          echo "=== set local role test ==="
          docker exec compat-pg-dbrest psql -U postgres -d postgres -c "BEGIN; SET LOCAL ROLE web_anon; SELECT count(*) FROM api.todos; ROLLBACK;"
          echo "=== as authenticator (simulate dbrest pool) ==="
          docker exec compat-pg-dbrest psql -U authenticator -d postgres -c "BEGIN TRANSACTION READ ONLY; SET LOCAL ROLE web_anon; SELECT count(*) FROM api.todos; ROLLBACK;"

      - name: start dbrest
        run: |
          nohup /tmp/dbrest > /tmp/dbrest.log 2>&1 &
          echo $! > /tmp/dbrest.pid
        env:
          PGRST_DB_URI: "postgres://authenticator:authenticator_pass@localhost:5433/postgres"
          PGRST_DB_SCHEMAS: "api, private"
          PGRST_DB_ANON_ROLE: "web_anon"
          PGRST_JWT_SECRET: "reallyreallyreallyreallyverysafe"
          DBREST_DB_BACKEND: "postgres"
          DBREST_SERVER_PORT: "3001"

      - name: wait for dbrest
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "dbrest is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for dbrest"
          cat /tmp/dbrest.log
          exit 1

      - name: run client tests
        run: go test -p 1 ./client/... -v -timeout 180s
        env:
          POSTGREST_URL: http://localhost:3001
          JWT_SECRET: reallyreallyreallyreallyverysafe

      - name: show dbrest logs on failure
        if: failure()
        run: cat /tmp/dbrest.log || true

      - name: stop stack
        if: always()
        run: |
          kill "$(cat /tmp/dbrest.pid)" 2>/dev/null || true
          docker compose -f docker/dbrest/pg-only.yaml down -v

  test-dbrest-sqlite:
    name: "test against dbrest+SQLite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: install sqlite3
        run: sudo apt-get install -y sqlite3

      - name: checkout dbrest
        uses: actions/checkout@v4
        with:
          repository: tamnd/dbrest
          ref: feat/sqlite-compat
          path: dbrest-src

      - name: build dbrest
        run: go build -o /tmp/dbrest-sqlite ./cmd/dbrest
        working-directory: dbrest-src

      - name: init SQLite database
        run: |
          sqlite3 /tmp/compat.db < docker/dbrest/sqlite/schema.sql
          sqlite3 /tmp/compat.db < docker/dbrest/sqlite/seed.sql

      - name: start dbrest
        run: |
          REGISTRY='[{"name":"add","params":[{"name":"a","type":"integer"},{"name":"b","type":"integer"}],"returns":{"kind":"scalar","type":"integer"},"volatility":"stable","sql":"SELECT :a + :b"},{"name":"get_todos_count","params":[],"returns":{"kind":"scalar","type":"integer"},"volatility":"stable","sql":"SELECT count(*) FROM todos"},{"name":"get_person_by_name","params":[{"name":"name_param","type":"text"}],"returns":{"kind":"table","columns":[{"name":"id","type":"integer"},{"name":"name","type":"text"},{"name":"age","type":"integer"},{"name":"email","type":"text"}]},"volatility":"stable","sql":"SELECT id, name, age, email FROM persons WHERE name = :name_param"}]'
          PGRST_DB_URI=/tmp/compat.db \
          PGRST_DB_SCHEMAS="api, private" \
          PGRST_DB_ANON_ROLE=web_anon \
          PGRST_JWT_SECRET=reallyreallyreallyreallyverysafe \
          DBREST_DB_BACKEND=sqlite \
          DBREST_SERVER_PORT=3001 \
          DBREST_FUNCTION_REGISTRY="$REGISTRY" \
          nohup /tmp/dbrest-sqlite > /tmp/dbrest-sqlite.log 2>&1 &
          echo $! > /tmp/dbrest-sqlite.pid

      - name: wait for dbrest
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "dbrest-sqlite is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for dbrest-sqlite"
          cat /tmp/dbrest-sqlite.log
          exit 1

      - name: run client tests
        run: go test -p 1 ./client/... -v -timeout 180s
        env:
          POSTGREST_URL: http://localhost:3001
          JWT_SECRET: reallyreallyreallyreallyverysafe

      - name: show dbrest logs on failure
        if: failure()
        run: cat /tmp/dbrest-sqlite.log || true

      - name: stop dbrest
        if: always()
        run: kill "$(cat /tmp/dbrest-sqlite.pid)" 2>/dev/null || true

  test-dbrest-mysql:
    name: "test against dbrest+MySQL"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: start MySQL
        run: docker compose -f docker/dbrest/mysql/compose.yaml up -d

      - name: checkout dbrest
        uses: actions/checkout@v4
        with:
          repository: tamnd/dbrest
          ref: feat/sqlite-compat
          path: dbrest-src

      - name: build dbrest
        run: go build -o /tmp/dbrest-mysql ./cmd/dbrest
        working-directory: dbrest-src

      - name: wait for MySQL
        run: |
          for i in $(seq 1 40); do
            if docker exec compat-mysql-dbrest mysqladmin ping -h localhost -u dbrest -pDbrest\!Passw0rd --silent > /dev/null 2>&1; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 3
          done
          echo "timeout waiting for MySQL"
          docker compose -f docker/dbrest/mysql/compose.yaml logs
          exit 1

      - name: init MySQL database
        run: |
          docker exec -i compat-mysql-dbrest mysql -u dbrest -pDbrest\!Passw0rd api < docker/dbrest/mysql/schema.sql
          docker exec -i compat-mysql-dbrest mysql -u dbrest -pDbrest\!Passw0rd api < docker/dbrest/mysql/seed.sql

      - name: start dbrest
        run: |
          REGISTRY='[{"name":"add","params":[{"name":"a","type":"integer"},{"name":"b","type":"integer"}],"returns":{"kind":"scalar","type":"integer"},"volatility":"stable","sql":"SELECT :a + :b"},{"name":"get_todos_count","params":[],"returns":{"kind":"scalar","type":"integer"},"volatility":"stable","sql":"SELECT count(*) FROM todos"},{"name":"get_person_by_name","params":[{"name":"name_param","type":"text"}],"returns":{"kind":"table","columns":[{"name":"id","type":"integer"},{"name":"name","type":"text"},{"name":"age","type":"integer"},{"name":"email","type":"text"}]},"volatility":"stable","sql":"SELECT id, name, age, email FROM persons WHERE name = :name_param"}]'
          PGRST_DB_URI="dbrest:Dbrest\!Passw0rd@tcp(127.0.0.1:3306)/api?parseTime=true" \
          PGRST_DB_SCHEMAS="api, private" \
          PGRST_DB_ANON_ROLE=web_anon \
          PGRST_JWT_SECRET=reallyreallyreallyreallyverysafe \
          DBREST_DB_BACKEND=mysql \
          DBREST_SERVER_PORT=3001 \
          DBREST_FUNCTION_REGISTRY="$REGISTRY" \
          nohup /tmp/dbrest-mysql > /tmp/dbrest-mysql.log 2>&1 &
          echo $! > /tmp/dbrest-mysql.pid

      - name: wait for dbrest
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "dbrest-mysql is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for dbrest-mysql"
          cat /tmp/dbrest-mysql.log
          exit 1

      - name: run client tests
        run: go test -p 1 ./client/... -v -timeout 180s
        env:
          POSTGREST_URL: http://localhost:3001
          JWT_SECRET: reallyreallyreallyreallyverysafe

      - name: show dbrest logs on failure
        if: failure()
        run: cat /tmp/dbrest-mysql.log || true

      - name: stop stack
        if: always()
        run: |
          kill "$(cat /tmp/dbrest-mysql.pid)" 2>/dev/null || true
          docker compose -f docker/dbrest/mysql/compose.yaml down -v

  test-dbrest-sqlserver:
    name: "test against dbrest+SQL Server"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: start SQL Server
        run: docker compose -f docker/dbrest/sqlserver/compose.yaml up -d

      - name: checkout dbrest
        uses: actions/checkout@v4
        with:
          repository: tamnd/dbrest
          ref: feat/sqlite-compat
          path: dbrest-src

      - name: build dbrest
        run: go build -o /tmp/dbrest-sqlserver ./cmd/dbrest
        working-directory: dbrest-src

      - name: wait for SQL Server
        run: |
          for i in $(seq 1 40); do
            if docker exec compat-mssql-dbrest /opt/mssql-tools18/bin/sqlcmd \
               -S localhost -U sa -P 'Dbrest!Passw0rd1' -Q 'SELECT 1' -C -b > /dev/null 2>&1; then
              echo "SQL Server is up"
              exit 0
            fi
            sleep 3
          done
          echo "timeout waiting for SQL Server"
          docker compose -f docker/dbrest/sqlserver/compose.yaml logs
          exit 1

      - name: create database and init schema
        run: |
          docker exec compat-mssql-dbrest /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Dbrest!Passw0rd1' -C -b \
            -Q "IF DB_ID('compat') IS NULL CREATE DATABASE compat"
          docker exec -i compat-mssql-dbrest /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Dbrest!Passw0rd1' -C -b -d compat \
            -i /dev/stdin < docker/dbrest/sqlserver/schema.sql
          docker exec -i compat-mssql-dbrest /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Dbrest!Passw0rd1' -C -b -d compat \
            -i /dev/stdin < docker/dbrest/sqlserver/seed.sql

      - name: wait for full-text index population
        run: |
          for i in $(seq 1 20); do
            STATUS=$(docker exec compat-mssql-dbrest /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P 'Dbrest!Passw0rd1' -C -b -d compat \
              -Q "SET NOCOUNT ON; SELECT crawl_type_desc FROM sys.fulltext_index_catalog_usages fi JOIN sys.fulltext_indexes i ON i.object_id=fi.fulltext_index_object_id WHERE OBJECT_NAME(i.object_id)='todos'" \
              -h -1 2>&1 | tr -d ' \r\n')
            if [ "$STATUS" = "AUTO" ] || [ "$STATUS" = "NONE" ]; then
              echo "Full-text index ready (status=$STATUS)"
              break
            fi
            echo "Waiting for FT index... ($i/20)"
            sleep 2
          done

      - name: start dbrest
        run: |
          PGRST_DB_URI="sqlserver://sa:Dbrest\!Passw0rd1@127.0.0.1:1433?database=compat" \
          PGRST_DB_SCHEMAS="dbo, private" \
          PGRST_DB_ANON_ROLE=web_anon \
          PGRST_JWT_SECRET=reallyreallyreallyreallyverysafe \
          DBREST_DB_BACKEND=sqlserver \
          DBREST_SERVER_PORT=3001 \
          nohup /tmp/dbrest-sqlserver > /tmp/dbrest-sqlserver.log 2>&1 &
          echo $! > /tmp/dbrest-sqlserver.pid

      - name: wait for dbrest
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "dbrest-sqlserver is up"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for dbrest-sqlserver"
          cat /tmp/dbrest-sqlserver.log
          exit 1

      - name: run client tests
        run: go test -p 1 ./client/... -v -timeout 180s
        env:
          POSTGREST_URL: http://localhost:3001
          JWT_SECRET: reallyreallyreallyreallyverysafe

      - name: show dbrest logs on failure
        if: failure()
        run: cat /tmp/dbrest-sqlserver.log || true

      - name: stop stack
        if: always()
        run: |
          kill "$(cat /tmp/dbrest-sqlserver.pid)" 2>/dev/null || true
          docker compose -f docker/dbrest/sqlserver/compose.yaml down -v

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: vet
        run: go vet ./...
